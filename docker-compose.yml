services:
  postgres:
    image: postgres:16-alpine
    container_name: selene-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=selene_admin
      - POSTGRES_PASSWORD=x9Fm2KpR7vLq4WnB8cYt3Hj6DsA1Gf5d
      - POSTGRES_DB=selene
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - selene
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selene_admin -d selene"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: selene-timescaledb
    restart: unless-stopped
    environment:
      - POSTGRES_USER=selene_ts
      - POSTGRES_PASSWORD=k0iAjJmuzPH3xD8dh25W5Fod7B9PC73rl2qFUdnqrks=
      - POSTGRES_DB=selene_measurements
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - selene
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selene_ts -d selene_measurements"]
      interval: 5s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.7.0
    container_name: selene-emqx
    restart: unless-stopped
    environment:
      - EMQX_NAME=selene
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - selene

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: selene-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8787
      - DATABASE_URL=postgresql://selene_admin:x9Fm2KpR7vLq4WnB8cYt3Hj6DsA1Gf5d@postgres:5432/selene
      - TIMESCALE_URL=postgresql://selene_ts:k0iAjJmuzPH3xD8dh25W5Fod7B9PC73rl2qFUdnqrks=@timescaledb:5432/selene_measurements
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
      - MQTT_TOPIC=selene/+/telemetry
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      emqx:
        condition: service_started
    networks:
      - selene

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: selene-frontend
    restart: unless-stopped
    ports:
      - "4173:3000"
    networks:
      - selene

networks:
  selene:
    driver: bridge

volumes:
  postgres_data:
  timescale_data:
  emqx_data:
  emqx_log:
