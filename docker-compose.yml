# docker-compose.yml (project root)
services:
  postgres:
    image: postgres:16-alpine
    container_name: selene-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=selene_admin
      - POSTGRES_PASSWORD=x9Fm2KpR7vLq4WnB8cYt3Hj6DsA1Gf5d
      - POSTGRES_DB=selene
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - selene
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selene_admin -d selene"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: selene-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8787
      - DATABASE_URL=postgresql://selene_admin:x9Fm2KpR7vLq4WnB8cYt3Hj6DsA1Gf5d@postgres:5432/selene
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - selene

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: selene-frontend
    restart: unless-stopped
    ports:
      - "4173:3000"
    networks:
      - selene

networks:
  selene:
    driver: bridge

volumes:
  postgres_data:
